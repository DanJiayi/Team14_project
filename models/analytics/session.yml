version: 2

models:
  - name: fact_session
    description: One row per session, summarizing website events for funnel analysis.
    columns:
      - name: SESSION_ID
        description: Unique identifier of a session.
        tests:
          - unique
          - not_null

      - name: CLIENT_ID
        description: Unique identifier of the client associated with the session.

      - name: SESSION_AT
        description: Timestamp when the session started.

      # page features
      - name: page_view_count
        description: Total number of page views in the session.

      - name: viewed_shop_page
        description: Whether the session viewed a shop-related page.

      - name: viewed_cart_page
        description: Whether the session viewed the cart page.

      - name: viewed_faq_page
        description: Whether the session viewed the FAQ page.

      - name: viewed_plant_care_page
        description: Whether the session viewed a plant care page.

      # item features
      - name: item_view_count
        description: Total number of item view events in the session.

      - name: distinct_items_viewed
        description: Number of distinct items viewed in the session.

      - name: add_to_cart_count
        description: Total number of add-to-cart actions in the session.

      - name: remove_from_cart_count
        description: Total number of remove-from-cart actions in the session.

      - name: removed_from_cart
        description: Whether the session removed at least one item from the cart.

      - name: order_count
        description: Total number of orders placed in the session.

      # funnel flags
      - name: viewed_item
        description: Whether the session viewed at least one item.

      - name: added_to_cart
        description: Whether the session added at least one item to the cart.

      - name: placed_order
        description: Whether the session placed an order.