version: 2

models:
  - name: dim_item
    description: "Dimension table containing unique product names and their corresponding unit prices."
    columns:
      - name: item_key
        description: "Primary key used for joining item details with fact tables."
        tests:
          - unique
          - not_null
      - name: item_name
        description: "Standardized name of the product."
      - name: price_per_unit
        description: "Unit price of the item as captured from the source data."

  - name: fact_order
    description: "Order-level fact table providing financial metrics including revenue, shipping, and net income after refunds."
    columns:
      - name: order_id
        description: "Unique identifier for each transaction."
        tests:
          - unique
          - not_null
      - name: session_id
        description: "Identifier for the web session associated with the order."
      - name: client_id
        description: "Unique identifier for the client who placed the order."
        tests:
          - not_null
      - name: item_key
        description: "Foreign key linking to the item dimension table."
      - name: order_at
        description: "The timestamp when the order was successfully recorded."
      - name: state
        description: "Shipping destination state for regional sales analysis."
      - name: gross_item_revenue
        description: "Total revenue from products before applying shipping or taxes."
      - name: shipping_cost_amount
        description: "Total cost charged to the customer for shipping."
      - name: tax_rate
        description: "The percentage of tax applied to the order."
      - name: total_order_amount
        description: "Gross value of the order including items and shipping."
      - name: is_refunded
        description: "Boolean indicator showing if the order was returned."
      - name: is_refunded_flag
        description: "Numeric version of the refund status for easier calculation in reporting tools."
      - name: net_order_amount
        description: "Net revenue retained after subtracting refunds where returned orders are set to zero."